name: Monthly Billing Automation

on:
  schedule:
    - cron: '0 0 1 * *' # Her ayın 1'inde çalışır
  workflow_dispatch: # GitHub üzerinden manuel tetiklemek için

jobs:
  run-billing:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Next.js API Route
        run: |
          curl -X POST https://novatrum.eu/api/cron/monthly-billing \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "Content-Type: application/json"